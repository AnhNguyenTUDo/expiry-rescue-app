# Application
spring.application.name=expiry-rescue-app
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/expiry_rescue_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Set JWT_SECRET environment variable in .env file
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Firebase
firebase.config.path=classpath:firebase-service-account.json
firebase.storage.bucket=your-project-id.appspot.com

# CORS
cors.allowed.origins=http://localhost:3000

# Frontend URL for OAuth2 redirects
frontend.url=http://localhost:3000

# Logging
logging.level.practice.expiry_rescue_app=DEBUG
logging.level.org.springframework.security=DEBUG

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# For colorful console output
spring.output.ansi.enabled=ALWAYS