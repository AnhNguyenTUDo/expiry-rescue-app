# Application
spring.application.name=expiry-rescue-app
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/expiry_rescue_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-must-be-at-least-256-bits-long
jwt.expiration=86400000

# Firebase
firebase.config.path=classpath:firebase-service-account.json
firebase.storage.bucket=your-project-id.appspot.com

# CORS
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.practice.expiry_rescue_app=DEBUG
logging.level.org.springframework.security=DEBUG
